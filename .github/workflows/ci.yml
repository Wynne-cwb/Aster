name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  size-guard:
    name: Bundle Size Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run size
        # size-limit exits with non-zero if any entry exceeds the limit (see .size-limit.json).
        # This causes the CI job to fail and marks the PR as red (AC4: "守卫在执行").
        # Gate: initial main-*.js ≤ 100 KB gzip (raised from 82 KB on 2026-06-05, Phase 26 user call;
        # still well under the PRD ≤1MB budget). Heavy modules (parsers/SDKs) must still lazy-load.
